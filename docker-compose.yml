version: '3.8'

services:
  evolution:
    image: atendai/evolution-api:v1.8.7
    container_name: instabot-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=Uivk4Y6sh3aclefB07jpnbMXHS1rmEuT
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DEL_INSTANCE=false
      - LANGUAGE=pt-BR
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
